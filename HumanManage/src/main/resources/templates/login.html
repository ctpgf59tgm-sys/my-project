<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>登录</title>


    <!--正确引入 CSS -->
    <link rel="stylesheet" th:href="@{/css/element-ui.css}">
    <!-- JavaScript 保持用 script -->
    <script type="text/javascript" th:src="@{/js/vue.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/element-ui.js}"></script>
    <script type="text/javascript" th:src="@{/js/axios.min.js}"></script>

    <style>
        /* 玻璃态登录界面样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景叠加：图片透明层 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/image/hxy.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.2;
            z-index: 1;
        }

        /* 动态光晕效果 */
        body::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            animation: floating 15s infinite ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes floating {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(1deg);
            }
            100% {
                transform: translateY(0) rotate(0deg);
            }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 400px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片：玻璃态设计 */
        .box-card {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.25) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 15px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .box-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        /* 卡片头部样式 */
        .el-card__header {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3) !important;
            text-align: center;
            font-weight: 600;
            color: #ffffff;
            font-size: 1.2em;
            padding: 14px 0;
        }

        /* 表单标签颜色 */
        .el-form-item__label {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
        }

        /* 输入框样式 */
        .el-input__inner {
            background-color: rgba(255, 255, 255, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: white !important;
            border-radius: 8px !important;
            height: 40px;
            transition: all 0.3s ease;
        }

        .el-input__inner::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        .el-input__inner:hover {
            background-color: rgba(255, 255, 255, 0.35) !important;
            border-color: rgba(255, 255, 255, 0.6) !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .el-input__inner:focus {
            border-color: #ffffff !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
        }

        /* 登录按钮 */
        .el-button--primary {
            width: 100%;
            background-color: rgba(255, 255, 255, 0) !important; /* 完全透明 */
            border: 1px solid rgba(255, 255, 255, 0.4) !important; /* 设置边框颜色 */
            color: white !important;
            font-weight: 600;
            padding: 12px 0;
            border-radius: 8px !important;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); /* 调整阴影颜色使其更柔和 */
        }

        .el-button--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 255, 255, 0.2); /* 悬停时增加阴影的可见度 */
        }

        .el-button--primary:active {
            transform: translateY(0);
        }


        /* 标题 */
        h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-container">
        <h2>欢迎登录</h2>
        <el-card class="box-card">
            <div slot="header">
                <span>用户登录</span>
            </div>
            <el-form ref="loginForm" label-width="80px" @submit.native.prevent="onSubmit">
                <el-form-item label="账户">
                    <el-input placeholder="请输入手机" v-model="user.phone" clearable></el-input>
                </el-form-item>
                <el-form-item label="密码">
                    <el-input placeholder="请输入密码" v-model="user.password" show-password clearable>
                    </el-input>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" native-type="submit">登 录</el-button>
                </el-form-item>

            </el-form>
        </el-card>
    </div>
</div>
<script>
    new Vue({
        el:"#app",
        data(){
            return{
                user:{
                    phone:"",
                    password:"",
            }
            }
        },
        methods:{
            onSubmit(){
                axios({
                    url:"/api/user/login",
                    headers:{"Content-Type":"application/jsion"},
                    method:"POST",
                    params:{
                        phone:this.user.phone,
                        password:this.user.password
                    }
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        setTimeout(function(){
                            window.location.href="/"
                        },1000)
                    }else {
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器错误，请稍后重试!",error)
                })
            },
        }
    })
</script>
</body>
</html>
