<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!--正确引入 CSS -->
    <link rel="stylesheet" th:href="@{/css/element-ui.css}">
    <!-- JavaScript 保持用 script -->
    <script type="text/javascript" th:src="@{/js/vue.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/element-ui.js}"></script>
    <script type="text/javascript" th:src="@{/js/axios.min.js}"></script>
    <style>
        /*最外层透明*/
        .el-table, .el-table__expanded-cell{
            background-color: transparent;
        }
        /* 表格内背景颜色 */
        .el-table th,
        .el-table tr,
        .el-table td {
            background-color: transparent;
        }


    </style>
</head>
<body>
<div id="app">

    <center>
    <el-form :inline="true" class="demo-form-inline">
        <el-form-item label="姓名">
            <el-input v-model="searchUser.username" placeholder="请输入姓名"></el-input>
        </el-form-item>
        <el-form-item label="手机">
            <el-input v-model="searchUser.userPhone" placeholder="请输入手机"></el-input>
        </el-form-item>
        <el-form-item>
            <el-button type="success" round @click="search()">查询</el-button>
            <el-button type="primary" round @click="openAddDrawer()">添加</el-button>
        </el-form-item>
    </el-form>
    </center>
    <template>
        <el-table
                :data="tableData"
                border
                style="width: 100%">
            <el-table-column
                    fixed
                    label="序号"
                    type="index"
                    align="center"
                    width="80">
            </el-table-column>
            <el-table-column
                    prop="username"
                    label="姓名"
                    align="center"
                    width="130">
            </el-table-column>
            <el-table-column
                    prop="gender"
                    label="性别"
                    align="center"
                    width="100">
            </el-table-column>
            <el-table-column
                    label="状态"
                    align="center"
                    width="200">
                <template slot-scope="scope">
                    <el-switch
                            style="display: block"
                            v-model="scope.row.status"
                            active-color="#13ce66"
                            inactive-color="#ff4949"
                            :active-value="1"
                            :inactive-value="0"
                            @change="updateStatus(scope.row.id,scope.row.status)"
                            active-text="活跃"
                            inactive-text="异常">
                    </el-switch>
                </template>
            </el-table-column>
            <el-table-column
                    prop="userPhone"
                    label="手机号码"
                    align="center"
                    width="150">
            </el-table-column>
            <el-table-column
                    prop="userEmail"
                    label="邮箱"
                    width="300">
            </el-table-column>
            <el-table-column
                    prop="address"
                    label="地址"
                    align="center"
                    width="200">
            </el-table-column>
            <el-table-column
                    prop="birthday"
                    label="生日"
                    align="center"
                    width="150">
            </el-table-column>
            <el-table-column
                    prop="createDate"
                    label="注册日期"
                    align="center"
                    width="150">
            </el-table-column>
            <el-table-column
                    fixed="right"
                    label="操作"
                    align="center"
                    width="200">
                <template slot-scope="scope">
                    <el-popconfirm
                            confirm-button-text='好的'
                            cancel-button-text='不用了'
                            @confirm="deleteUser(scope.row.id)"
                            icon="el-icon-info"
                            icon-color="red"
                            :title=title
                    >
                        <el-button slot="reference" @click="setTitle(scope.row.username)" type="danger" icon="el-icon-delete" plain circle></el-button>
                    </el-popconfirm>

                    <el-button type="primary" @click="openDrawer(scope.row)" icon="el-icon-edit" plain circle></el-button>
                </template>
            </el-table-column>
        </el-table>
        <el-drawer
                title="修改用户信息"
                :visible.sync="drawer"
                :with-header="true">
            <span>
                <el-form ref="form" :model="form" label-width="80px">
                  <el-form-item label="姓名">
                    <el-input v-model="form.username"></el-input>
                  </el-form-item>
                    <el-form-item label="性别">
                    <el-radio-group v-model="form.gender">
                      <el-radio label="男" value="男"></el-radio>
                      <el-radio label="女" value="女"></el-radio>
                    </el-radio-group>
                  </el-form-item>
                    <el-form-item label="手机">
                    <el-input v-model="form.userPhone"></el-input>
                  </el-form-item>
                    <el-form-item label="邮箱">
                    <el-input v-model="form.userEmail"></el-input>
                  </el-form-item>
                    <el-form-item label="地址">
                    <el-input v-model="form.address"></el-input>
                  </el-form-item>
                  <el-form-item label="生日">
                    <el-col :span="24">
                      <el-date-picker type="date" placeholder="选择日期" v-model="form.birthday" style="width: 100%;"></el-date-picker>
                    </el-col>
                  </el-form-item>
                  <el-form-item>
                    <el-button type="primary" @click="updateUser()">修改</el-button>
                    <el-button>取消</el-button>
                  </el-form-item>
                </el-form>
            </span>
        </el-drawer>
        <el-drawer title="新增用户" :visible.sync="addDrawer" :with-header="true">
            <el-form ref="addForm" :model="addForm" label-width="80px">
                <el-form-item label="姓名：">
                    <el-input v-model="addForm.username"></el-input>
                </el-form-item>
                <el-form-item label="性别：">
                    <el-radio v-model="addForm.gender" label="男">男</el-radio>
                    <el-radio v-model="addForm.gender" label="女">女</el-radio>
                </el-form-item>
                <el-form-item label="手机：">
                    <el-input v-model="addForm.userPhone"></el-input>
                </el-form-item>
                <el-form-item label="邮箱：">
                    <el-input v-model="addForm.userEmail"></el-input>
                </el-form-item>
                <el-form-item label="地址：">
                    <el-input v-model="addForm.address"></el-input>
                </el-form-item>
                <el-form-item label="生日：">
                    <el-date-picker type="date" placeholder="选择日期" v-model="addForm.birthday" style="width: 100%;"></el-date-picker>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="addUser()">确认新增</el-button>
                    <el-button @click="addDrawer = false">取消</el-button>
                </el-form-item>
            </el-form>
        </el-drawer>
    </template>

</div>
<script>
    new Vue({
        el:"#app",
        data(){
            return{
                tableData: [],
                addDrawer:false,
                addForm:{},
                searchUser:{
                    username:"",
                    userPhone:"",
                },
                title:"",
                drawer:false,
                form: {
                    username: '',
                    gender: '',
                    userPhone: '',
                    userEmail: '',
                    address:"",
                    birthday:"",
                }
            }
        },
        methods:{
            loadData() {
                axios({
                    url: "/api/user/getUser",
                    method: "GET",
                    headers: {"Content-Type": "application/json"},
                    params: {
                        name: this.searchUser.username,
                        phone: this.searchUser.userPhone,
                    }
                }).then(response=>{
                   // console.log(response.data.data)
                    this.tableData = response.data.data
                }).catch(error=>{
                    this.$message.error("服务器错误,请重试！")
                })
            },
            search(){
                this.loadData();
            },
            setTitle(username){
                this.title = "你确定要删除【"+username+"】吗？"
            },
            updateStatus(id,status){
                //console.log(id,status)
                axios({
                    url:"/api/user/updateStatus",
                    method: "POST",
                    headers:{"Content-Type":"application/json"},
                    params: {
                        id:id,
                        status:status,
                    }
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器错误，请稍后重试！");
                })
            },
            deleteUser(id){
                axios({
                    url:"/api/user/delete",
                    method: "POST",
                    headers:{"Content-Type":"application/json"},
                    params: {
                        id:id,
                    }
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        this.loadData()
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器错误，请稍后重试！");
                })
            },
            openDrawer(user){
                this.form = user
                this.drawer = true
            },
            updateUser(){
                console.log()
                axios({
                    url:"/api/user/update",
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    data:JSON.stringify(this.form),
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        this.drawer = false
                        this.loadData()
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器错误，请稍后重试！");
                })
            },
            openAddDrawer(){
                this.addForm = {}
                this.addDrawer = true
            },
            addUser(){
                axios({
                    url:"/api/user/add",
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    data:JSON.stringify(this.addForm)
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        this.addDrawer = false
                        this.loadData()
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器新增失败，请稍后重试！");
                })
            }
        },

        mounted() {
            this.loadData()
        }
    })
</script>
</body>
</html>
